# Server port
server.port=8080

# Logging
logging.level.root=INFO
logging.level.com.example.reporisk=DEBUG
# Netty on macOS: native DNS resolver may be missing; fallback works. Avoid ERROR noise.
logging.level.io.netty.resolver.dns=WARN

llm.api.url=${LLM_API_URL:}
llm.api.key=${LLM_API_KEY:}
llm.model=${LLM_MODEL:gpt-3.5-turbo}
